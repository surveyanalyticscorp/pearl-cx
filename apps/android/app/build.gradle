apply plugin: 'com.android.application'

/**
 * Set this to true to create two separate APKs instead of one:
 *   - An APK that only works on ARM devices
 *   - An APK that only works on x86 devices
 * The advantage is the size of the APK is reduced by about 4MB.
 * Upload all the APKs to the Play Store and people will download
 * the correct one based on the CPU architecture of their device.
 */
def enableSeparateBuildPerCPUArchitecture = false

android {
    compileSdkVersion 29
    buildToolsVersion "29.0.2"
    useLibrary 'org.apache.http.legacy'
    defaultConfig {
        applicationId "com.questionpro"
        minSdkVersion 16
        targetSdkVersion 29
        multiDexEnabled true
        ndk.abiFilters 'armeabi-v7a', 'arm64-v8a', 'x86', 'x86_64'
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    splits {
        abi {
            reset()
            enable enableSeparateBuildPerCPUArchitecture
            universalApk false  // If true, also generate a universal APK
            include "armeabi-v7a", "x86", "arm64-v8a", "x86_64"
        }

    }
    lintOptions {
        warning 'InvalidPackage', 'MissingPermission'
        abortOnError false
        checkReleaseBuilds false
    }

    signingConfigs {
        release {
            storeFile file("/Users/apple/Desktop/keystore/QuestionProKey")
            storePassword 'questionpro'
            keyAlias 'questionpro_keystore'
            keyPassword 'questionpro'
        }
    }

    buildTypes {
        release {
            debuggable false
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.release
        }
        debug {
            debuggable true
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }

    applicationVariants.all { variant ->
        variant.outputs.each { output ->
            // For each separate APK per architecture, set a unique version code as described here:
            // http://tools.android.com/tech-docs/new-build-system/user-guide/apk-splits
            def versionCodes = ["armeabi-v7a": 1, "x86": 2, "arm64-v8a": 3, "x86_64": 4]
            def abi = output.getFilter(com.android.build.OutputFile.ABI)
            if (abi != null) {  // null for the universal-debug, universal-release variants
                output.versionCodeOverride =
                        versionCodes.get(abi) * 1048576 + defaultConfig.versionCode
            }
        }
    }

    flavorDimensions "app"
    productFlavors{
        communities{
            applicationId "com.questionpro.communities"
            versionCode 7
            versionName "1.5"
        }
        cx{
            applicationId "com.questionpro.cx"
            versionCode 5
            versionName "1.5"
        }
    }
}

dependencies {
    compile('com.google.android.gms:play-services-gcm:11.8.0') {
        force = true
    }
    compileOnly fileTree(include: ['*.jar'], dir: 'libs')
    compile files('libs/fastjson-1.1.45.android.jar')
    androidTestCompile('com.android.support.test.espresso:espresso-core:2.2.2', {
        exclude group: 'com.android.support', module: 'support-annotations'
    })
    implementation project(':gmslibrary')
    implementation 'com.google.android.gms:play-services:11.8.0'
    implementation 'com.google.android.gms:play-services-location:11.8.0'
    implementation 'com.google.android.gms:play-services-auth:11.8.0'

    implementation 'com.android.support:multidex:1.0.0'
    implementation "com.facebook.react:react-native:+"
    implementation 'com.facebook.fresco:animated-gif:1.10.0'
    implementation "com.facebook.fresco:animated-base-support:1.3.0"
    compile files('libs/gcm.jar')
    testImplementation 'junit:junit:4.12'
    implementation project(':react-native-i18n')
    implementation project(':react-native-device-info')
    implementation project(':react-native-contacts')
    implementation project(':react-native-android-keyboard-adjust')
    implementation project(':react-native-image-picker')
    implementation project(':react-native-fs')
    implementation project(':reactnativenotifications')
    implementation project (':react-native-linear-gradient')
    implementation project(':react-native-vector-icons')
    implementation project(':react-native-webview')
    implementation project(':react-native-document-picker')


    implementation 'com.squareup.picasso:picasso:2.5.2'
    compile('com.mikepenz:materialdrawer:5.6.0@aar') {
        transitive = true
    }
    implementation project(':react-native-webview-bridge')
    implementation 'net.openid:appauth:0.3.0'
    implementation project(':react-native-charts-wrapper')
    compile('com.microsoft.services:discovery-services:1.0.0@aar') {
        transitive = true
    }
    implementation project(':react-native-wheel-picker')
    implementation 'com.firebase:firebase-jobdispatcher:0.8.5'
    implementation project(':react-native-reanimated')
    implementation project (':react-native-gesture-handler')
    implementation "com.github.YarikSOffice:lingver:1.1.0"
    implementation 'androidx.fragment:fragment:1.1.0'

}
apply plugin: 'com.google.gms.google-services'

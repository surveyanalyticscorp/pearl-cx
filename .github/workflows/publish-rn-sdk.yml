name: Publish React Native Intercept SDK to NPM

on:
  workflow_dispatch:
    inputs:
      android_version:
        description: 'Android SDK version (e.g. 2.2.6)'
        required: true
        type: string
      ios_version:
        description: 'iOS SDK version (e.g. 1.0.0)'
        required: true
        type: string
      npm_version:
        description: 'NPM package version to publish (e.g. 1.0.0)'
        required: true
        type: string
      release_notes:
        description: 'Release notes (optional)'
        required: false
        type: string
      dry_run:
        description: 'Dry run - verify changes without publishing or committing'
        required: false
        type: boolean
        default: true

env:
  # Opt into Node.js 24 to fix deprecation warning
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      # ── Validate GH_PAT secret exists ────────────────────────────────────
      - name: Validate GH_PAT secret
        run: |
          if [ -z "${{ secrets.GH_PAT }}" ]; then
            echo "❌ GH_PAT secret is empty or not set!"
            echo "Go to: pearl-cx repo → Settings → Secrets and variables → Actions"
            echo "Add a secret named exactly: GH_PAT"
            exit 1
          else
            echo "✅ GH_PAT secret is present (length: ${#PAT} chars)"
          fi
        env:
          PAT: ${{ secrets.GH_PAT }}

      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          persist-credentials: true  # ensures token is kept for subsequent git ops

      # ── Git auth ──────────────────────────────────────────────────────────
      - name: Configure git authentication
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git
          echo "✅ Git remote URL updated with PAT"
          # Verify the remote is reachable
          git ls-remote origin HEAD && echo "✅ Remote is reachable" || echo "❌ Remote not reachable — check PAT permissions"

      # ── Node setup ────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        working-directory: react-native-intercept-sdk
        run: npm install

      # ── Print run mode ────────────────────────────────────────────────────
      - name: Print run mode
        run: |
          if [ "${{ github.event.inputs.dry_run }}" == "true" ]; then
            echo "🧪 DRY RUN MODE — nothing will be committed or published"
          else
            echo "🚀 LIVE MODE — changes will be committed and published to NPM"
          fi

      # ── Update Android native SDK version ─────────────────────────────────
      - name: Update Android SDK version in build.gradle
        working-directory: react-native-intercept-sdk
        run: |
          sed -i "s/com.github.surveyanalyticscorp:android-cx:[^'\"' ]*/com.github.surveyanalyticscorp:android-cx:${{ github.event.inputs.android_version }}/g" \
            android/build.gradle
          echo "✅ Android version set to ${{ github.event.inputs.android_version }}"

      # ── Update iOS native SDK version ─────────────────────────────────────
      - name: Update iOS SDK version in podspec
        working-directory: react-native-intercept-sdk
        run: |
          PODSPEC=$(find . -maxdepth 1 -name "*.podspec" | head -1)
          if [ -z "$PODSPEC" ]; then
            echo "❌ No podspec file found"
            exit 1
          fi
          echo "Found podspec: $PODSPEC"
          sed -i "s/s\.dependency 'InterceptSDK', '[^']*'/s.dependency 'InterceptSDK', '${{ github.event.inputs.ios_version }}'/" "$PODSPEC"
          echo "✅ iOS version set to ${{ github.event.inputs.ios_version }}"

      # ── Update package.json ───────────────────────────────────────────────
      - name: Set NPM package version and write native metadata
        working-directory: react-native-intercept-sdk
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${{ github.event.inputs.npm_version }}';
            pkg._nativeVersions = {
              android: '${{ github.event.inputs.android_version }}',
              ios: '${{ github.event.inputs.ios_version }}'
            };
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
            console.log('✅ package.json updated');
            console.log('  version:', pkg.version);
            console.log('  _nativeVersions:', JSON.stringify(pkg._nativeVersions));
          "

      # ── Run tests ─────────────────────────────────────────────────────────
      - name: Run tests
        working-directory: react-native-intercept-sdk
        run: npm test --if-present

      # ── TypeScript check ──────────────────────────────────────────────────
      - name: TypeScript check
        working-directory: react-native-intercept-sdk
        run: npx tsc --noEmit --skipLibCheck

      # ── Dry run summary ───────────────────────────────────────────────────
      - name: Dry run summary
        if: ${{ github.event.inputs.dry_run == 'true' }}
        working-directory: react-native-intercept-sdk
        run: |
          echo ""
          echo "╔══════════════════════════════════════════╗"
          echo "║           DRY RUN SUMMARY                ║"
          echo "╚══════════════════════════════════════════╝"
          echo ""
          echo "📦 NPM version that would be published:"
          node -p "require('./package.json').version"
          echo ""
          echo "📱 Native versions that would be embedded:"
          node -p "JSON.stringify(require('./package.json')._nativeVersions, null, 2)"
          echo ""
          echo "🤖 Android — android/build.gradle (android-cx line):"
          grep "android-cx" android/build.gradle || echo "  ⚠️ android-cx not found — check build.gradle path"
          echo ""
          echo "🍎 iOS — podspec dependency line:"
          grep "dependency" *.podspec || echo "  ⚠️ No podspec dependency found"
          echo ""
          echo "✅ All checks passed."
          echo "⚠️  Nothing was committed. Nothing was published to NPM."
          echo "👉 Re-run with dry_run = false to do a real release."

      # ── Commit + tag + push (live only) ───────────────────────────────────
      - name: Commit and tag
        if: ${{ github.event.inputs.dry_run == 'false' }}
        run: |
          git add react-native-intercept-sdk/android/build.gradle
          git add "react-native-intercept-sdk/"*.podspec
          git add react-native-intercept-sdk/package.json
          git commit -m "chore(rn-sdk): release v${{ github.event.inputs.npm_version }}

          Android SDK: ${{ github.event.inputs.android_version }}
          iOS SDK:     ${{ github.event.inputs.ios_version }}
          ${{ github.event.inputs.release_notes }}"
          git tag rn-sdk-v${{ github.event.inputs.npm_version }}
          git push origin HEAD --tags
          echo "✅ Committed and tagged rn-sdk-v${{ github.event.inputs.npm_version }}"

      # ── Publish to NPM (live only) ────────────────────────────────────────
      - name: Publish to NPM
        if: ${{ github.event.inputs.dry_run == 'false' }}
        working-directory: react-native-intercept-sdk
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # ── GitHub Release (live only) ────────────────────────────────────────
      - name: Create GitHub Release
        if: ${{ github.event.inputs.dry_run == 'false' }}
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: 'rn-sdk-v${{ github.event.inputs.npm_version }}',
              name: 'RN SDK v${{ github.event.inputs.npm_version }}',
              body: [
                '## React Native Intercept SDK',
                '',
                '### Native SDK Versions',
                '- 🤖 Android: `${{ github.event.inputs.android_version }}`',
                '- 🍎 iOS: `${{ github.event.inputs.ios_version }}`',
                '',
                '${{ github.event.inputs.release_notes }}'
              ].join('\n'),
              draft: false,
              prerelease: false
            });

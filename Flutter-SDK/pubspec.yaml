name: math_flutter
description: Flutter plugin for QuestionPro CX SDK integration. Supports Android and iOS platforms for customer feedback and survey collection.
version: 0.8.0
homepage: https://github.com/Dilpreet010/math_operations

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.example.math_flutter
        pluginClass: MathFlutterPlugin
      ios:
        pluginClass: MathFlutterPlugin

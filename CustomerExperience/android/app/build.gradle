apply plugin: "com.android.application"
apply plugin: 'com.google.gms.google-services'
apply plugin: 'org.jetbrains.kotlin.android'
apply plugin: "com.facebook.react"
/**     
* This is the configuration block to customize your React Native Android app.
 * By default you don't need to apply any configuration, just uncomment the lines you need.
 **/
react {
    autolinkLibrariesWithApp()

    /* Folders */
    //   The root of your project, i.e. where "package.json" lives. Default is '..'
    // root = file("../")
    //   The folder where the react-native NPM package is. Default is ../node_modules/react-native
    // reactNativeDir = file("../node_modules/react-native")
    //   The folder where the react-native Codegen package is. Default is ../node_modules/@react-native/codegen
    // codegenDir = file("../node_modules/@react-native/codegen")
    //   The cli.js file which is the React Native CLI entrypoint. Default is ../node_modules/react-native/cli.js
    // cliFile = file("../node_modules/react-native/cli.js")

    /* Variants */
    //   The list of variants to that are debuggable. For those we're going to
    //   skip the bundling of the JS bundle and the assets. By default is just 'debug'.
    //   If you add flavors like lite, prod, etc. you'll have to list your debuggableVariants.
    // debuggableVariants = ["liteDebug", "prodDebug"]

    /* Bundling */
    //   A list containing the node command and its flags. Default is just 'node'.
    // nodeExecutableAndArgs = ["node"]
    //
    //   The command to run when bundling. By default is 'bundle'
    // bundleCommand = "ram-bundle"
    //
    //   The path to the CLI configuration file. Default is empty.
    // bundleConfig = file(../rn-cli.config.js)
    //
    //   The name of the generated asset file containing your JS bundle
    // bundleAssetName = "MyApplication.android.bundle"
    //
    //   The entry file for bundle generation. Default is 'index.android.js' or 'index.js'
    // entryFile = file("../js/MyApplication.android.js")
    //
    //   A list of extra flags to pass to the 'bundle' commands.
    //   See https://github.com/react-native-community/cli/blob/main/docs/commands.md#bundle
    // extraPackagerArgs = []

    /* Hermes Commands */
    //   The hermes compiler command to run. By default it is 'hermesc'
    // hermesCommand = "$rootDir/my-custom-hermesc/bin/hermesc"
    //
    //   The list of flags to pass to the Hermes compiler. By default is "-O", "-output-source-map"
    // hermesFlags = ["-O", "-output-source-map"]
}
/**
 * Run Proguard to shrink the Java bytecode in release builds.
 */
def enableProguardInReleaseBuilds = false

/**
    * The preferred build flavor of JavaScriptCore (JSC)
 *
 * For example, to use the international variant, you can use:
 * `def jscFlavor = 'org.webkit:android-jsc-intl:+'`
 *
 * The international variant includes ICU i18n library and necessary data
 * allowing to use e.g. `Date.toLocaleString` and `String.localeCompare` that
 * give correct results when using with locales other than en-US.  Note that
 * this variant is about 6MiB larger per architecture than default.
 */
def jscFlavor = 'org.webkit:android-jsc:+'
def work_version = "2.8.0-alpha02"

/**
 * Whether to enable the Hermes VM.
 *
 * This should be set on project.ext.react and mirrored here.  If it is not set
 * on project.ext.react, JavaScript will not be compiled to Hermes Bytecode
 * and the benefits of using Hermes will therefore be sharply reduced.
 */
// Hermes is controlled by hermesEnabled=false in gradle.properties (RN 0.72+)

/**
 * Architectures to build native code for.
 */
// def reactNativeArchitectures() {
//     def value = project.getProperties().get("reactNativeArchitectures")
//     return value ? value.split(",") : ["armeabi-v7a", "x86", "x86_64", "arm64-v8a"]
// }   

def enableSeparateBuildPerCPUArchitecture = false

android {
    compileSdkVersion rootProject.ext.compileSdkVersion
    ndkVersion rootProject.ext.ndkVersion

    buildFeatures {
        buildConfig true
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    kotlinOptions {
        jvmTarget = "17"
    }
    namespace "com.questionpro.cxonthego"

    defaultConfig {
        applicationId "com.questionpro.cxonthego"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 32
        versionName "1.8.9"
        multiDexEnabled true
    }

 
        
    
 
 
    splits {
       
             abi {
            reset()
            enable enableSeparateBuildPerCPUArchitecture
            universalApk false  // If true, also generate a universal APK
            include "armeabi-v7a", "x86", "arm64-v8a", "x86_64"
        
            
                    }
    }
    signingConfigs {
            release {
                if (project.hasProperty('MYAPP_UPLOAD_STORE_FILE')) {
                    storeFile file(MYAPP_UPLOAD_STORE_FILE)
                    storePassword MYAPP_UPLOAD_STORE_PASSWORD
                    keyAlias MYAPP_UPLOAD_KEY_ALIAS
                    keyPassword MYAPP_UPLOAD_KEY_PASSWORD
                }
        }
        debug {
            // storeFile file("/Users/apple/pearl/questionpro_offline_surveys/android/QuestionProKey")
            storeFile file('../keystore/debug.keystore')
            storePassword 'questionpro'
            keyAlias 'questionpro_keystore'
            keyPassword 'questionpro'
        }
    }
    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            // Caution! In production, you need to generate your own keystore file.
            // see https://facebook.github.io/react-native/docs/signed-apk-android.
            signingConfig signingConfigs.release
            // Enables code shrinking, obfuscation, and optimization for only
            // your project's release build type. Make sure to use a build
            // variant with `debuggable false`.
            minifyEnabled enableProguardInReleaseBuilds

            // Enables resource shrinking, which is performed by the
            // Android Gradle plugin.
            shrinkResources false

            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }

    packaging {
        jniLibs {
            // Store .so files uncompressed in the APK so the OS can mmap them
            // directly at their on-disk alignment. Required for 16KB page size
            // compliance on Android 15+ devices (Google Play enforcement Nov 2025).
            // AGP 8.6+ defaults this to false; declared explicitly for clarity.
            useLegacyPackaging = false
        }
        pickFirst "lib/armeabi-v7a/libc++_shared.so"
        pickFirst "lib/arm64-v8a/libc++_shared.so"
        pickFirst "lib/x86/libc++_shared.so"
        pickFirst "lib/x86_64/libc++_shared.so"
        // Fix duplicate folly from RN + Reanimated
        pickFirst "lib/**/libfolly_runtime.so"
    }

     // Force exclude problematic Firebase resources
    // aaptOptions {
    //     ignoreAssetsPattern "!.svn:!.git:.*:!CVS:!thumbs.db:!picasa.ini:!*.scc:*~"
    // }
}

dependencies {
    implementation fileTree(dir: "libs", include: ["*.jar"])
  // The version of react-native is set by the React Native Gradle Plugin
    implementation("com.facebook.react:react-android")

    implementation "androidx.swiperefreshlayout:swiperefreshlayout:1.1.0"
//    implementation project(':react-native-device-info')
    implementation 'androidx.multidex:multidex:2.0.1'
    implementation 'com.squareup.okhttp3:okhttp:4.12.0'
    implementation 'org.jetbrains:annotations:24.0.1'          // Updated from 16.0.2
      implementation platform("com.google.firebase:firebase-bom:31.4.0")
implementation "com.google.firebase:firebase-analytics"
  implementation "com.google.firebase:firebase-messaging"
    // implementation 'com.google.firebase:firebase-messaging:23.0.8'  // Updated from 23.0.8

// implementation 'com.google.firebase:firebase-messaging:23.4.1'  // Updated from 23.0.8
// implementation 'com.google.firebase:firebase-messaging:22.0.0'  // Downgrade from 23.4.1

 // Force consistent AndroidX versions to fix release build
//  implementation 'androidx.appcompat:appcompat:1.4.2'

//    implementation "androidx.emoji2:emoji2:1.2.0"
//    implementation "androidx.emoji2:emoji2-views-helper:1.2.0"

//implementation 'androidx.appcompat:appcompat:1.6.1'        // Downgrade from 1.4.2
//implementation 'androidx.core:core:1.9.0'                  // Updated from 1.8.0
//implementation 'androidx.fragment:fragment:1.5.5'          // Updated from 1.5.0
//implementation 'androidx.activity:activity:1.6.1'          // Updated from 1.5.0

// Add missing AppCompat components for SDK 35
// implementation 'androidx.appcompat:appcompat-resources:1.4.2'
// implementation 'com.google.android.material:material:1.8.0'

    // implementation "androidx.startup:startup-runtime:1.1.1"

// Add missing animation/transition resources for NetInfo compatibility
implementation 'androidx.transition:transition:1.4.1'
implementation 'androidx.vectordrawable:vectordrawable-animated:1.1.0'

constraints {
        implementation("androidx.appcompat:appcompat") {
            version { strictly("1.6.1") }
        }
        implementation("androidx.appcompat:appcompat-resources") {
            version { strictly("1.6.1") }
        }
    }


    // if (enableHermes) {
    //     //noinspection GradleDynamicVersion
    //     implementation("com.facebook.react:hermes-engine:+") { // From node_modules
    //         exclude group:'com.facebook.fbjni'
    //     }
    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }
}


// Run this once to be able to run the application with BUCK
// puts all compile dependencies into folder libs for BUCK to use
tasks.register('copyDownloadableDepsToLibs', Copy) {
    from configurations.implementation
    into 'libs'
}

// Native modules autolink is handled by com.facebook.react.settings plugin in settings.gradle
//apply from: "../../node_modules/react-native/react.gradle"
// apply from: "../../node_modules/react-native-code-push/android/codepush.gradle"

configurations.configureEach {
    resolutionStrategy.eachDependency { details ->
        if (details.requested.group == "androidx.appcompat") {
            details.useVersion "1.6.1"
            details.because "RN 0.67.2 TextInput crash with appcompat 1.6.x"
        }
    }
}

tasks.register("cleanStaleBundledReactResources") {
    doLast {
        def resDir = file("src/main/res")
        if (!resDir.exists()) return

        def stale = fileTree(resDir) {
            include "drawable-*/node_modules_*"
            include "drawable-*/assets_*"
            include "drawable-*/app_config_*"

            include "raw/node_modules_*"
            include "raw/assets_*"
            include "raw/app_config_*"
        }

        if (!stale.isEmpty()) {
            println("Deleting stale JS-bundled resources from src/main/res:")
            stale.files.each { f -> println(" - " + f.path) }
            stale.files.each { f -> f.delete() }
        }
    }
}

preBuild.dependsOn("cleanStaleBundledReactResources")

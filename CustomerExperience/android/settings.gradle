pluginManagement {
    includeBuild("../node_modules/@react-native/gradle-plugin")
    repositories {
        gradlePluginPortal()
        google()
        mavenCentral()
    }
}

plugins {
    id("com.facebook.react.settings")
}

extensions.configure(com.facebook.react.ReactSettingsExtension) { ex ->
    ex.autolinkLibrariesFromCommand()
}

// Root-level includeBuild enables buildscript.classpath substitution for com.facebook.react:react-native-gradle-plugin
includeBuild("../node_modules/@react-native/gradle-plugin")

rootProject.name = 'CustomerExperience'
include ':app'

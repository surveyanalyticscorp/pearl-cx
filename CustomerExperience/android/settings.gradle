pluginManagement {
    includeBuild("../node_modules/@react-native/gradle-plugin")
    repositories {
        gradlePluginPortal()
        google()
        mavenCentral()
    }
}

plugins {
    id("com.facebook.react.settings")
}

extensions.configure(com.facebook.react.ReactSettingsExtension) { ex ->
    // Override default npx command — npx is nvm-local and not in Gradle daemon PATH.
    // Call the CLI directly via node, which is at /usr/local/bin/node.
    ex.autolinkLibrariesFromCommand(
        ["node", "node_modules/@react-native-community/cli/build/bin.js", "config"]
    )
}

// Root-level includeBuild enables buildscript.classpath substitution for com.facebook.react:react-native-gradle-plugin
includeBuild("../node_modules/@react-native/gradle-plugin")

rootProject.name = 'CustomerExperience'
include ':app'

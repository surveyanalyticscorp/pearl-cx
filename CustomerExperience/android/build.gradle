import org.apache.tools.ant.taskdefs.condition.Os
// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    ext {
        buildToolsVersion = "35.0.0"
        minSdkVersion = 26
        compileSdkVersion = 35
        targetSdkVersion = 35
        kotlinVersion = "2.0.21"       // RN 0.77 requires Kotlin 2.0 (K2 compiler)
        soLoaderVersion = "0.10.4"
        // NDK 27.1 required by RN 0.77. Install via Android Studio SDK Manager → SDK Tools → NDK (Side by side).
        ndkVersion = "27.1.12297006"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle:8.6.1")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath 'com.google.gms:google-services:4.4.2'
        classpath("de.undercouch:gradle-download-task:5.0.1")
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlinVersion"
    }
}

allprojects {
    repositories {

        google()
        mavenLocal()
        mavenCentral()
        maven {
            // All of React Native (JS, Obj-C sources, Android binaries) is installed from npm
            url("$rootDir/../node_modules/react-native/android")
        }

        maven { url 'https://www.jitpack.io' }
    }

    // RN 0.77 renamed com.facebook.react:react-native → com.facebook.react:react-android.
    // Some libraries (e.g. react-native-gesture-handler 2.30.1) still reference the old name.
    // This substitution fixes them all without patching each library.
    configurations.all {
        resolutionStrategy.eachDependency { details ->
            if (details.requested.group == "com.facebook.react" &&
                    details.requested.name == "react-native") {
                details.useTarget("com.facebook.react:react-android:0.77.2")
                details.because("react-native artifact renamed to react-android in RN 0.71+")
            }
        }
    }
}

// ViewManagerWithGeneratedInterface was removed from react-android 0.77.
// react-native-gesture-handler 2.30.1 Old Architecture (paper) codegen interfaces extend it.
// Inject a stub source directory into gesture-handler's compilation to satisfy the reference
// without patching node_modules.
subprojects { project ->
    project.afterEvaluate {
        if (project.name == "react-native-gesture-handler") {
            if (project.hasProperty("android")) {
                project.android.sourceSets.main.java.srcDirs += [
                    new File(rootProject.projectDir, "stubs/java")
                ]
            }
        }

        // AGP 8.2+ validates @InputFile properties at task-execution time. reanimated 3.x has no
        // typedef annotations so extractAnnotations never creates typedefs.txt, but syncLibJars
        // still declares it as a required input. A simple configuration-time file creation is wiped
        // by `clean`, so instead we register a stub task and wire it as a dependency so Gradle
        // re-creates the empty file after every clean, before the validation fires.
        if (project.name == "react-native-reanimated") {
            ['debug', 'release'].each { variantName ->
                def capitalizedVariant = variantName.capitalize()
                def typedefFile = project.file(
                    "${project.buildDir}/intermediates/annotations_typedef_file" +
                    "/${variantName}/extract${capitalizedVariant}Annotations/typedefs.txt"
                )
                def stubTaskName = "createReanimated${capitalizedVariant}TypedefStub"
                def stubTask = project.tasks.register(stubTaskName) {
                    outputs.file(typedefFile)
                    doLast {
                        typedefFile.parentFile.mkdirs()
                        typedefFile.createNewFile()
                    }
                }
                project.tasks.matching { it.name == "sync${capitalizedVariant}LibJars" }.configureEach {
                    dependsOn(stubTask)
                }
            }
        }
    }
}



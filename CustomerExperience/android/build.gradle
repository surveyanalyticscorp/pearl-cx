import org.apache.tools.ant.taskdefs.condition.Os
// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    ext {
        buildToolsVersion = "34.0.0"   // Updated from 31.0.0
        minSdkVersion = 26
        compileSdkVersion = 34         // Updated from 34
        targetSdkVersion = 35          // Updated from 34
        kotlinVersion = "1.8.22"
        soLoaderVersion = "0.10.4"
        // NDK 24 — fully installed, valid path (27.1 has a corrupt partial install at sdk/ndk/27.1.12297006)
        // To use NDK 27: delete sdk/ndk/27.1.12297006 dir then reinstall via SDK Manager
        ndkVersion = "24.0.8215888"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle:7.4.2")
        classpath("com.facebook.react:react-native-gradle-plugin") // substituted by includeBuild in settings.gradle
        classpath 'com.google.gms:google-services:4.3.15'
        classpath("de.undercouch:gradle-download-task:5.0.1")
                classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlinVersion"
    }
}

allprojects {
    def REACT_NATIVE_VERSION = new File(['node', '--print',"JSON.parse(require('fs').readFileSync(require.resolve('react-native/package.json'), 'utf-8')).version"].execute(null, rootDir).text.trim())

    repositories {

        google()
        mavenLocal()
        mavenCentral()
        maven {
            // All of React Native (JS, Obj-C sources, Android binaries) is installed from npm
            url("$rootDir/../node_modules/react-native/android")
        }
        maven {
            // Android JSC is installed from npm
            url("$rootDir/../node_modules/jsc-android/dist")
        }

        jcenter()
        maven { url 'https://www.jitpack.io' }
    }

    configurations.all {

        resolutionStrategy {
                       force "com.facebook.react:react-native:" + REACT_NATIVE_VERSION
                        force "com.facebook.soloader:soloader:0.10.4"
        


        }
    }
}



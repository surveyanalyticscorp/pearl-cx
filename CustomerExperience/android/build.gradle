import org.apache.tools.ant.taskdefs.condition.Os
// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    ext {
//buildToolsVersion = "30.0.2"  // Revert to original
// buildToolsVersion = "31.0.0"  // Revert to original
        buildToolsVersion = "34.0.0"   // Updated from 31.0.0
        minSdkVersion = 26
        compileSdkVersion = 34         // Updated from 34
        targetSdkVersion = 35          // Updated from 34
        kotlinVersion = "1.5.31"
        soLoaderVersion = "0.10.4"

         if (System.properties['os.arch'] == "aarch64") {
            // For M1 Users we need to use the NDK 24 which added support for aarch64
            ndkVersion = "24.0.8215888"
        } else {
            // Otherwise we default to the side
            ndkVersion =   '21.4.7075529'
        }
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath('com.android.tools.build:gradle:7.1.3')
        classpath ('com.facebook.react:react-native-gradle-plugin')
        classpath 'com.google.gms:google-services:4.3.15'
        classpath("de.undercouch:gradle-download-task:4.1.2")
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlinVersion"
    }
}

allprojects {
    def REACT_NATIVE_VERSION = new File(['node', '--print',"JSON.parse(require('fs').readFileSync(require.resolve('react-native/package.json'), 'utf-8')).version"].execute(null, rootDir).text.trim())

    repositories {

        google()
        mavenLocal()
        mavenCentral()
        maven {
            // All of React Native (JS, Obj-C sources, Android binaries) is installed from npm
            url("$rootDir/../node_modules/react-native/android")
        }
        maven {
            // Android JSC is installed from npm
            url("$rootDir/../node_modules/jsc-android/dist")
        }

        jcenter()
        maven { url 'https://www.jitpack.io' }
    }

    configurations.all {

        resolutionStrategy {
                       force "com.facebook.react:react-native:" + REACT_NATIVE_VERSION
                        force "com.facebook.soloader:soloader:0.10.4"
                        force "androidx.appcompat:appcompat:1.3.1"
                        force "androidx.appcompat:appcompat-resources:1.3.1"
        


        }
    }
}
